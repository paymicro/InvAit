name: Quality Gate

on: 
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Blazor Workload
        run: dotnet workload install wasm-tools

      - name: Install Workloads (Blazor only)
        run: dotnet workload restore UIBlazor/UIBlazor.csproj

      - name: Restore (Only .NET 10 Projects)
        run: |
          dotnet restore UIBlazor/UIBlazor.csproj
          dotnet restore UIBlazor.Tests/UIBlazor.Tests.csproj

      - name: Test & Collect Coverage
        run: dotnet test UIBlazor.Tests/UIBlazor.Tests.csproj --configuration Release --collect:"XPlat Code Coverage;Format=cobertura;Threshold=70;ThresholdType=line;ThresholdStat=total" --results-directory ./TestResults

      - name: Generate Report
        uses: danielpalme/ReportGenerator-GitHub-Action@5.5.2
        with:
          reports: 'TestResults/**/coverage.cobertura.xml'
          targetdir: 'coveragereport'
          reporttypes: 'HtmlInline;Badges'

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./coveragereport