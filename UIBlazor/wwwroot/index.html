<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UIBlazor</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <script type="importmap"></script>
    <link href="UIBlazor.styles.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/base16/default-dark.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="css/loading.css">
</head>

<body>
    <div id="app">
        <div class="loading-container">
            <div class="loading-ball"></div>
            <div class="loading-ball"></div>
            <div class="loading-ball"></div>
        </div>
    </div>

    <div id="blazor-error-ui" style="display: none !important;">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script src="_content/Radzen.Blazor/Radzen.Blazor.min.js"></script>

    <!-- либы из из CDN -->
    <script src="lib/highlight.min.js"></script>            <!-- https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/highlight.min.js -->
    <script src="lib/marked.umd.js"></script>               <!-- https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js -->
    <script src="lib/marked-highlight.index.js"></script>   <!-- https://cdn.jsdelivr.net/npm/marked-highlight/lib/index.umd.js -->
    <script src="lib/mermaid.min.js"></script>              <!-- https://cdn.jsdelivr.net/npm/mermaid@11.12.2/dist/mermaid.min.js -->
    
    <!-- самописные скрипты -->
    <script src="js/app.js"></script>
    <script src="js/markdown-renderer.js"></script>
</body>

</html>
