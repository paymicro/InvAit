<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UIBlazor</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <script type="importmap"></script>
    <link href="UIBlazor.styles.css" rel="stylesheet" />

    <!-- стили из CDN -->
    <!-- https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/base16/default-dark.css -->
    <link rel="stylesheet" href="lib/highlight-default-dark.css">
    <!-- https://fontawesome.com/download -->
    <link rel="stylesheet" href="lib/fontawesome-free-7.2.0-web/css/all.min.css">
    <link rel="stylesheet" href="css/loading.css">
</head>

<body>
    <div id="app">
        <div class="loading-container">
            <div class="loading-ball"></div>
            <div class="loading-ball"></div>
            <div class="loading-ball"></div>
        </div>
    </div>

    <div id="blazor-error-ui" style="display: none !important;">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <!-- либы из CDN -->
    <script src="lib/highlight.min.js"></script>            <!-- https://www.jsdelivr.com/package/npm/highlight.js -->
    <script src="lib/marked.umd.js"></script>               <!-- https://www.jsdelivr.com/package/npm/marked -->
    <script src="lib/marked-highlight.index.js"></script>   <!-- https://www.jsdelivr.com/package/npm/marked-highlight -->
    <script src="lib/mermaid.min.js"></script>              <!-- https://www.jsdelivr.com/package/npm/mermaid -->
    <!-- самописные скрипты -->
    <script src="js/app.js"></script>
    <script src="js/markdown-renderer.js"></script>

    <!-- ядро -->
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script src="_content/Radzen.Blazor/Radzen.Blazor.min.js"></script>
</body>

</html>
